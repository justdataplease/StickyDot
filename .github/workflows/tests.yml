name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-tests:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Run offline tests
        run: python -m unittest discover -s tests -v

      - name: Check source syntax
        run: python -m py_compile notes_widget.py keep_sync.py token_flow.py windows_integration.py

      - name: Check command-line startup
        run: python notes_widget.py --help
